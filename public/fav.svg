<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Blue gradient circle background -->
  <circle cx="16" cy="16" r="16" fill="url(#blueGradient)"/>
  <!-- Globe lines - white -->
  <g stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round">
    <!-- Central vertical meridian -->
    <line x1="16" y1="6" x2="16" y2="26"/>
    <!-- Horizontal latitude lines -->
    <path d="M 8 12 Q 16 10 24 12" />
    <path d="M 8 16 Q 16 14 24 16" />
    <path d="M 8 20 Q 16 18 24 20" />
    <!-- Curved vertical meridians -->
    <path d="M 10 8 Q 16 10 10 24" />
    <path d="M 22 8 Q 16 10 22 24" />
  </g>
</svg>
