<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3 2">
  <!-- Green background -->
  <rect width="3" height="2" fill="#009b3a"/>
  
  <!-- Yellow rhombus -->
  <polygon points="1.5,0.1 2.9,1 1.5,1.9 0.1,1" fill="#fedf00"/>
  
  <!-- Blue circle -->
  <circle cx="1.5" cy="1" r="0.4" fill="#002776"/>
  
  <!-- White band -->
  <path d="M 1.1 0.8 Q 1.5 0.7 1.9 0.8" stroke="#ffffff" stroke-width="0.05" fill="none"/>
  
  <!-- Stars (simplified representation) -->
  <g fill="#ffffff">
    <circle cx="1.3" cy="0.9" r="0.02"/>
    <circle cx="1.7" cy="0.9" r="0.02"/>
    <circle cx="1.5" cy="1.1" r="0.02"/>
    <circle cx="1.2" cy="1.2" r="0.02"/>
    <circle cx="1.8" cy="1.2" r="0.02"/>
  </g>
</svg>
