<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLxAI Summit 2026 - Uniting Industry Leaders for Sign Language x AI</title>
    <meta name="description" content="Join the inaugural SLxAI Summit where industry leaders will establish a cooperative nonprofit to shape the future of sign language x AI technologies. Apply for founding member status." />
    <meta name="keywords" content="SLxAI, sign language, AI, summit, cooperative, nonprofit, accessibility, technology, founding members, industry leaders" />
    <meta name="author" content="SLxAI" />

    <link rel="icon" type="image/png" href="/favicon-globe.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-globe.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-globe.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-globe.png" />
    <link rel="shortcut icon" href="/favicon-globe.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slxai.org/" />
    <meta property="og:title" content="SLxAI Summit 2026 - Uniting Industry Leaders for Sign Language x AI" />
    <meta property="og:description" content="Join the historic gathering where industry leaders will establish the cooperative nonprofit that will shape the future of sign language x AI technologies. Secure your company's board seat." />
    <meta property="og:image" content="/slxai-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SLxAI Summit" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://slxai.org/" />
    <meta name="twitter:title" content="SLxAI Summit 2026 - Uniting Industry Leaders for Sign Language x AI" />
    <meta name="twitter:description" content="Join the historic gathering where industry leaders will establish the cooperative nonprofit that will shape the future of sign language x AI technologies. Secure your company's board seat." />
    <meta name="twitter:image" content="/slxai-card.png" />
    <meta name="twitter:site" content="@slxai_org" />
    <meta name="twitter:creator" content="@slxai_org" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="distribution" content="global" />

    <!-- Note: Security headers (X-Frame-Options, X-Content-Type-Options, etc.) are set via HTTP headers in vite.config.ts -->
    <!-- CSP is also set via HTTP headers for better security -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @font-face {
        font-family: 'RedSoxFont';
        src: url('/RedSoxFont-Bold.otf') format('opentype');
        font-weight: bold;
        font-style: normal;
      }
    </style>
  </head>

  <body>
    <!-- Runs before React: prevents global dark-mode CSS (white text on white bg) on /summit2027 -->
    <script>
      (function () {
        try {
          var path = window.location.pathname || '';
          if (path.indexOf('summit2027') === -1) return;
          var el = document.documentElement;
          el.setAttribute('data-sponsorship-page', 'true');
          el.classList.remove('dark');
          el.style.colorScheme = 'light';
          document.body.style.backgroundColor = '#ffffff';
          document.body.style.color = '#0f172a';
        } catch (_) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
